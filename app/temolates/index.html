<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WhatsApp Simulator</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin: 12px 0; }
    input, textarea, button { width: 100%; padding: 10px; margin-top: 8px; }
    button { cursor: pointer; }
    small { color: #666; }
  </style>
</head>
<body>
  <h2>WhatsApp Simulator</h2>
  <p><small>Target webhook: <b>{{ target or "NÃO CONFIGURADO" }}</b></small></p>

  <div class="card">
    <h3>Enviar mensagem (custom)</h3>
    <form method="post" action="/api/send">
      <label>instance</label>
      <input name="instance" value="{{ default_instance }}" />
      <label>from_number</label>
      <input name="from_number" value="5531999000001" />
      <label>text</label>
      <textarea name="text">Oi</textarea>
      <button type="submit">Disparar</button>
    </form>
  </div>

  <div class="card">
    <h3>Cenários</h3>

    <form method="post" action="/api/scenario/menu">
      <input name="instance" value="{{ default_instance }}" />
      <input name="from_number" value="5531999000001" />
      <button type="submit">Scenario: menu (Oi)</button>
    </form>

    <form method="post" action="/api/scenario/lead3">
      <input name="instance" value="{{ default_instance }}" />
      <input name="from_number" value="5531999000002" />
      <button type="submit">Scenario: lead3 (3 msgs)</button>
    </form>

    <form method="post" action="/api/scenario/lead1">
      <input name="instance" value="{{ default_instance }}" />
      <input name="from_number" value="5531999000003" />
      <button type="submit">Scenario: lead1 (1 msg)</button>
    </form>

    <form method="post" action="/api/scenario/dedupe">
      <input name="instance" value="{{ default_instance }}" />
      <input name="from_number" value="5531999000004" />
      <button type="submit">Scenario: dedupe (msg id repetido)</button>
    </form>
  </div>

  <div class="card">
    <h3>Loadtest leve</h3>
    <form method="post" action="/api/loadtest">
      <label>instance</label>
      <input name="instance" value="{{ default_instance }}" />
      <label>users</label>
      <input name="users" value="20" />
      <label>message</label>
      <input name="message" value="Oi" />
      <button type="submit">Disparar</button>
    </form>
  </div>
</body>
</html>
