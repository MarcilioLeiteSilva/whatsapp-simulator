<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WhatsApp Simulator</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 12px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
      label { display:block; margin-top: 10px; font-size: 13px; color:#333; }
      input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
      button { padding: 10px 14px; border: 0; border-radius: 8px; cursor: pointer; }
      pre { background: #f6f6f6; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
      .row { display:flex; gap: 10px; }
      .row > div { flex:1; }
    </style>
  </head>
  <body>
    <h2>WhatsApp Simulator (DEV only)</h2>

    <div class="card">
      <div><b>Target webhook:</b> {{ target or "N/A" }}</div>
    </div>

    <div class="card">
      <h3>Enviar mensagem</h3>
      <form method="post" action="/send">
        <div class="row">
          <div>
            <label>Instance</label>
            <input name="instance" value="{{ default_instance }}" />
          </div>
          <div>
            <label>From number</label>
            <input name="from_number" value="{{ default_from }}" />
          </div>
        </div>

        <label>Push name</label>
        <input name="push_name" value="Teste" />

        <label>Text</label>
        <textarea name="text" rows="3">Oi</textarea>

        <div style="margin-top:12px;">
          <button type="submit">Enviar</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h3>Cenários</h3>
      <form method="post" action="/scenario/lead3" style="margin-bottom:10px;">
        <input type="hidden" name="instance" value="{{ default_instance }}" />
        <input type="hidden" name="from_number" value="{{ default_from }}" />
        <button type="submit">Lead 3 passos</button>
      </form>

      <form method="post" action="/scenario/dedup">
        <input type="hidden" name="instance" value="{{ default_instance }}" />
        <input type="hidden" name="from_number" value="{{ default_from }}" />
        <button type="submit">Dedup (mesmo message_id 2x)</button>
      </form>
    </div>

    {% if result %}
      <div class="card">
        <h3>Resultado</h3>
        <pre>{{ result }}</pre>
      </div>
    {% endif %}
  </body>
</html>
